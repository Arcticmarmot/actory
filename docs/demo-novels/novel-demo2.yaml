title: "玻璃剧场"
screenplayType: "stage_play"
chapters:
  - id: "chapter-1"
    title: "空椅子"
    content: |
      小剧场在冬夜里亮着最后一排灯。观众席空荡荡的，只有第三排中央放着一把木椅，椅背上搭着一条深蓝色围巾。

      林照站在舞台边，手里捏着退场通知。他曾经在这里演过十七个角色，王子、疯子、失眠的父亲，还有一棵没有台词的树。如今剧场要拆了，所有角色都像被提前关进黑暗。

      编剧许眠从后台走出来，抱着一摞旧剧本。她说：“今晚排最后一次吧。没有观众，也可以演。”

  - id: "chapter-2"
    title: "迟到的演员"
    content: |
      第一幕开始时，门口传来急促的脚步声。多年不见的女主演周岚推门而入，雪花落在她肩上，像某种迟到的掌声。

      林照没有看她。他按剧本说：“你不该回来。”

      周岚笑了一下，也按剧本说：“可你一直把门留着。”

      他们都知道这句台词不是原来的。许眠坐在台下，笔尖停住。她发现每个人都在把自己的旧事塞进角色里，像把最后一点火藏进纸页。

  - id: "chapter-3"
    title: "改写结尾"
    content: |
      排到第三幕时，剧本散了。灯光师老秦把追光打偏，照亮了观众席那把木椅。那是去世的团长常坐的位置，也是所有人不敢提起的空缺。

      周岚忽然停下，说：“我当年不是因为害怕离开。”

      林照终于抬头。许眠没有阻止，她把剧本合上，听见舞台深处传来木板轻微的回声。那些年没说完的话，借着角色的嘴，在旧剧场里慢慢站起来。

  - id: "chapter-4"
    title: "谢幕"
    content: |
      午夜十二点，最后一盏灯落下。没有掌声，只有暖气管道里传来细小的声响，像剧场自己在呼吸。

      他们把那把木椅搬到舞台中央。许眠把改好的结尾念出来：剧场不是房子，剧场是有人愿意在黑暗里等另一个人开口。

      林照和周岚并肩站着，向空荡荡的观众席鞠躬。雪停了，拆迁围挡外，有人路过，听见里面传来一声很轻的“谢谢”。
