title: "雨后信笺"
screenplayType: "standard_film"
chapters:
  - id: "chapter-1"
    title: "青石巷"
    content: |
      雨停在傍晚六点，青石巷里的水光还没有散。苏晚拎着旧皮箱，站在巷口那棵梧桐树下，像站在一封迟迟没有寄出的信里。

      她离开小城已经七年。邮局的红漆门仍旧褪色，门环上挂着一圈潮湿的铜绿。她推门进去时，风铃轻轻响了一声，值班台后没有人，只有一盏台灯照着摊开的登记簿。

      登记簿最上面夹着一封信，信封上写着她的名字。字迹很慢，像写字的人怕惊动什么。苏晚没有立刻拆开，她先听见了屋檐落水的声音，一滴，一滴，像有人在远处计时。

  - id: "chapter-2"
    title: "旧邮局"
    content: |
      陈屿从里屋出来时，手里还拿着一把钥匙。他比记忆里安静了一些，衬衫袖口卷到小臂，眼神却还是像少年时那样清亮。

      “你回来了。”他说。

      苏晚点点头，把信推到他面前。她想问很多事，问这封信为什么会在今天出现，问父亲临走前是否真的来过这里，问七年前那个没有等到答案的夜晚究竟算不算告别。

      陈屿没有急着解释。他打开旧邮柜，里面整整齐齐放着一排未寄出的信。每一封都写给不同的人，每一封右下角都盖着同一个日期：雨季开始的第一天。

  - id: "chapter-3"
    title: "等风的人"
    content: |
      夜色落下来，邮局外的街灯一盏盏亮起。苏晚拆开那封信，纸页有淡淡的樟木味。父亲在信里没有说歉意，只写他年轻时曾经答应一个人，要把小城里所有来不及说出口的话都送到。

      陈屿站在门边，替她把窗户关小一点。风从缝隙里钻进来，吹动桌上的邮票，像一群准备启程的鸟。

      苏晚读到最后一行时，天边传来很远的汽笛声。她抬头看陈屿，终于明白有些人不是被时间留下，而是选择在原地替别人等风。

      第二天清晨，她把第一封信投进邮筒。红色邮筒在雨后的阳光里微微发亮，像一个终于醒来的旧梦。
