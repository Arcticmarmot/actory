title: "雾港八夜"
screenplayType: "commercial_short_drama"
chapters:
  - id: "chapter-1"
    title: "失踪的灯塔"
    content: |
      雾港的灯塔在第八次钟声后熄灭。整座小镇陷进潮湿的白雾里，码头上的船铃无风自响。

      记者沈棠赶到时，警戒线已经拉到海堤边。守塔人老余失踪，灯塔底层只留下半杯热茶和一张被水浸开的照片。

      照片背面写着一句话：别让她回港。

  - id: "chapter-2"
    title: "归来的女孩"
    content: |
      第二天清晨，一个叫叶宁的女孩从渡轮上下来。她拖着银色行李箱，脸色苍白，却准确说出了灯塔旧门的密码。

      镇长坚持说她只是游客。沈棠却发现，二十年前失踪名单里有一个同名女孩，年龄、生日、左耳后的胎记，全都对得上。

      叶宁望着灯塔，低声说：“我不是回来找真相的，我是回来还一样东西。”

  - id: "chapter-3"
    title: "潮汐账本"
    content: |
      老余家里有一本潮汐账本，记录着每年雾最浓的夜晚。账本最后一页被撕掉，只剩半行字：船会在没有月亮的时候靠岸。

      沈棠沿着码头走访，发现镇上老人都在回避同一个名字：白鸥号。那艘船二十年前沉没，官方记录写着意外，可遇难者家属从没见过遗体。

      叶宁看见“白鸥号”三个字时，手指开始发抖。

  - id: "chapter-4"
    title: "旧戏院"
    content: |
      第四夜，沈棠收到匿名短信，让她去废弃戏院。舞台幕布已经发霉，观众席却整整齐齐摆着八盏煤油灯。

      叶宁坐在第一排，像早就知道她会来。她拿出一枚生锈的船牌，说这是白鸥号真正的编号，也是她父亲临死前塞进她手里的东西。

      幕布后忽然响起录音，老余的声音断断续续：“他们还在港口下面。”

  - id: "chapter-5"
    title: "港口下面"
    content: |
      港口下面不是海，是一条被封死的旧防空洞。洞壁潮湿，贴满褪色的寻人启事，每一张都是白鸥号的乘客。

      沈棠意识到，沉船也许从来没有发生。有人把整艘船的人带进这里，抹掉身份，再把雾港变成一座巨大的沉默机器。

      叶宁走到尽头，发现墙上刻着自己的名字，后面跟着两个字：已归。

  - id: "chapter-6"
    title: "第八盏灯"
    content: |
      第六夜，灯塔突然亮起第八盏灯。雾里出现一排黑影，像船，也像人。

      镇长带人封锁海堤，声称这是气象事故。沈棠把直播打开，对准灯塔。镜头里，失踪的老余站在塔顶，手里举着那本缺页的潮汐账本。

      他没有求救，只说：“今晚，所有欠下的名字都会回来。”

  - id: "chapter-7"
    title: "白鸥靠岸"
    content: |
      午夜，白鸥号的船影出现在港口尽头。它没有发动机声，船身却带着二十年前的海盐味。

      叶宁登上甲板，看见父亲的外套挂在驾驶室里，口袋中有一封没寄出的信。信里写着，当年他们发现了一桩走私案，船上所有人因此被灭口。

      沈棠在直播里读出信，镇上的灯一盏盏亮起。沉默二十年的雾，终于被人撕开一道口子。

  - id: "chapter-8"
    title: "雾散之后"
    content: |
      天亮时，雾港第一次露出完整的海岸线。老余被救下，镇长被带走，旧防空洞里找到的证物装满了三辆车。

      叶宁把船牌交给沈棠，说自己终于知道为什么必须回来。不是为了复仇，是为了让那些被藏起来的人重新拥有名字。

      灯塔重新点亮。沈棠站在海堤上，看见叶宁的渡轮慢慢离港。阳光落在海面，像一场迟到二十年的谢幕。
